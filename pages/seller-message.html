    <div class="whatsapp-container">
        <div class="whatsapp-content">
            <h1>Contact Seller</h1>
            <p class="whatsapp-subtitle">Fill in your details to reach the seller via WhatsApp</p>
            
            <div class="customer-details">
                <div class="form-group">
                    <label for="customer-number">Your Number</label>
                    <input 
                        type="tel" 
                        id="customer-number" 
                        placeholder="e.g., +254 123 456 789" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="message-input">Message</label>
                    <textarea 
                        id="message-input" 
                        placeholder="Type your message here..." 
                        rows="6"
                        required
                    ></textarea>
                </div>

                <button class="btn-main whatsapp-send" onclick="sendMessagePreview()">Send</button>
            </div>
        </div>
    </div>
