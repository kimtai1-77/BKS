    <link rel="stylesheet" href="../styles.css">
    <script src="../main.js" defer></script>
    <script src="../scripts/prices.js" defer></script>
    <script src="../scripts/message.js" defer></script>

    <!--Bungee Spice-->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Bungee+Spice&family=DM+Serif+Display:ital@0;1&family=DM+Serif+Text:ital@0;1&family=Macondo&family=Ojuju:wght@200..800&family=Pixelify+Sans:wght@400..700&family=Poiret+One&family=Press+Start+2P&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&family=Silkscreen:wght@400;700&family=Sora:wght@100..800&family=VT323&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=DM+Serif+Display:ital@0;1&family=DM+Serif+Text:ital@0;1&family=Macondo&family=Ojuju:wght@200..800&family=Pixelify+Sans:wght@400..700&family=Poiret+One&family=Press+Start+2P&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&family=Silkscreen:wght@400;700&family=Sora:wght@100..800&family=VT323&display=swap" rel="stylesheet">

</head>
<body>
    <div class="top-bar">
        <div class="offer-bar">
            <h3>BKS</h3>
        </div>
        <div class="logo">
        </div>
    </div>

    <div class="whatsapp-container">
        <div class="whatsapp-content">
            <h1>What would you like to ask?</h1>
            <p class="whatsapp-subtitle">Type your question below and the seller will respond via WhatsApp</p>
            
            <div class="customer-details">
                <div class="form-group">
                    <label for="question-input">Question</label>
                    <textarea 
                        id="question-input" 
                        placeholder="Enter your question..." 
                        rows="6"
                        required
                    ></textarea>
                </div>

                <button class="btn-main send-question" onclick="sendQuestion()">Send</button>
            </div>
        </div>
    </div>

</body>
</html>
